name: Golden Path Bootstrap

on:
  pull_request:
    paths:
      - "install_my_programs_unix"
      - "install_my_programs_debian"
      - "run_commands/**"
      - "verify_post_install_unix"
      - "Makefile"
      - ".github/workflows/golden-path-bootstrap.yml"
  push:
    branches:
      - master
    paths:
      - "install_my_programs_unix"
      - "install_my_programs_debian"
      - "run_commands/**"
      - "verify_post_install_unix"
      - "Makefile"
      - ".github/workflows/golden-path-bootstrap.yml"

concurrency:
  group: golden-path-bootstrap-${{ github.repository }}
  cancel-in-progress: true

jobs:
  bootstrap-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ubuntu:24.04

    steps:
      - name: Install checkout dependencies
        run: |
          set -eu
          for i in 1 2 3; do
            if apt-get update && apt-get install -y git ca-certificates; then
              exit 0
            fi
            echo "Retrying checkout dependency install (${i}/3)"
            sleep 5
          done
          echo "Failed to install checkout dependencies after retries"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base bootstrap prerequisites
        run: |
          set -eu
          for i in 1 2 3; do
            if apt-get update && apt-get install -y sudo curl unzip python3 python3-pip; then
              exit 0
            fi
            echo "Retrying base prerequisite install (${i}/3)"
            sleep 5
          done
          echo "Failed to install base prerequisites after retries"
          exit 1

      - name: Run installer (golden path)
        run: |
          set -eu
          for i in 1 2; do
            if INSTALLER_SKIP_UPGRADE=1 timeout 25m ./install_my_programs_unix --skip-ml --skip-fonts; then
              exit 0
            fi
            echo "Retrying golden path installer (${i}/2)"
            sleep 10
          done
          echo "Golden path installer failed after retries"
          exit 1

      - name: Run verification
        run: ./verify_post_install_unix

      - name: Assert expected config outputs
        run: test -f "$HOME/.zshrc" && test -f "$HOME/.tmux.conf" && test -f "$HOME/.config/nvim/init.lua"
