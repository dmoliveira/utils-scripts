name: Publish Docs to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.pages_ready.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: setup_pages
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build with Jekyll
        if: steps.setup_pages.outcome == 'success'
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload Pages artifact
        if: steps.setup_pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Pages not enabled notice
        if: steps.setup_pages.outcome != 'success'
        run: |
          echo "Skipping Pages deployment: repository Pages is not enabled for this token or repo settings."

      - name: Set pages-ready output
        id: pages_ready
        run: |
          echo "ready=${{ steps.setup_pages.outcome == 'success' }}" >> "$GITHUB_OUTPUT"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success' && needs.build.outputs.pages_ready == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
