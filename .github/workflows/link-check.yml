name: Link Check

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**/*.md"
      - ".github/workflows/link-check.yml"
  push:
    branches:
      - master
    paths:
      - "README.md"
      - "docs/**/*.md"
      - ".github/workflows/link-check.yml"

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          lycheeVersion: latest
          fail: true
          args: --no-progress --verbose README.md docs/**/*.md
