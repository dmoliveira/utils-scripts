name: Link Check

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**/*.md"
      - "wiki/**/*.md"
      - ".github/workflows/link-check.yml"
  push:
    branches:
      - master
    paths:
      - "README.md"
      - "docs/**/*.md"
      - "wiki/**/*.md"
      - ".github/workflows/link-check.yml"

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links with Dockerized lychee
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}:/work" \
            -w /work \
            lycheeverse/lychee:latest \
            --no-progress --verbose README.md docs/**/*.md wiki/**/*.md
