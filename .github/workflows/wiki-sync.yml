name: Sync GitHub Wiki

on:
  push:
    branches:
      - master
    paths:
      - "wiki/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check wiki enablement
        id: wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          has_wiki="$(gh api repos/${{ github.repository }} --jq .has_wiki)"
          echo "enabled=${has_wiki}" >> "$GITHUB_OUTPUT"
          if [ "${has_wiki}" != "true" ]; then
            echo "Repository wiki is disabled; skipping wiki sync."
          fi

      - name: Clone wiki repo
        id: clone_wiki
        if: steps.wiki.outputs.enabled == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki

      - name: Sync wiki content
        if: steps.wiki.outputs.enabled == 'true' && steps.clone_wiki.outcome == 'success'
        run: |
          set -euo pipefail
          rsync -av --delete --exclude '.git' wiki/ /tmp/wiki/

      - name: Commit and push wiki changes
        if: steps.wiki.outputs.enabled == 'true' && steps.clone_wiki.outcome == 'success'
        env:
          GH_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          cd /tmp/wiki
          if git diff --quiet; then
            echo "No wiki changes to publish"
            exit 0
          fi
          git config user.name "${GH_ACTOR}"
          git config user.email "${GH_ACTOR}@users.noreply.github.com"
          git add .
          git commit -m "docs: sync wiki from repository"
          git push

      - name: Wiki clone unavailable notice
        if: steps.wiki.outputs.enabled == 'true' && steps.clone_wiki.outcome != 'success'
        run: |
          echo "Skipping wiki sync: wiki git repository is not available for this token/repository yet."
