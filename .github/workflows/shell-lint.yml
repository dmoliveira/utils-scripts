name: Shell Lint

on:
  pull_request:
    paths:
      - "install_my_programs_*"
      - "verify_*"
      - "doctor_post_install_unix"
      - "bootstrap_shell_secrets"
      - "rollback_installer_backups"
      - "br_init_project"
      - "bd_init_project"
      - "codex_apply_config"
      - "repomix_generate"
      - "general/**"
      - "python/update_python_library"
      - ".github/workflows/shell-lint.yml"
  push:
    branches:
      - master
    paths:
      - "install_my_programs_*"
      - "verify_*"
      - "doctor_post_install_unix"
      - "bootstrap_shell_secrets"
      - "rollback_installer_backups"
      - "br_init_project"
      - "bd_init_project"
      - "codex_apply_config"
      - "repomix_generate"
      - "general/**"
      - "python/update_python_library"
      - ".github/workflows/shell-lint.yml"

jobs:
  shellcheck-shfmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml', '.markdownlint-cli2.yaml') }}

      - name: Install lint tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt && python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit lint suite
        run: pre-commit run --all-files
